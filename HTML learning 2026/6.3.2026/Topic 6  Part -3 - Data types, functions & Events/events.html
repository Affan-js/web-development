<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functions🧩 & Events 📲</title>

    <script>
        function submit(username) {

            alert('you submitted data' + username);
        }






    </script>
</head>

<body>
    <input type="text" placeholder="Enter name" id="Namegrab"> </input>
    <input type="button" onclick="submit(document.getElementById('Namegrab').value)" value="Submit"></input>
</body>

</html>
