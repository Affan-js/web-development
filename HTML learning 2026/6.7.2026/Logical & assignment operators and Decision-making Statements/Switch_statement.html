<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch</title>
    <script>
        var floor = Number(prompt('Enter your floor')); // 5 floor b

        switch(floor) 
        {
            case 1:
                document.write("welcome to floor 1 🚥");
                break;

            case 2:
                document.write("welcome to floor 2 🚥");
                break;

            case 3:
                document.write("welcome to floor 3 🚥");
                break;

            case 4:
                document.write("welcome to floor 4 🚥");
                break;

            case 5:
                document.write("welcome to floor 5 🚥");
                break;
            default: 
                document.write('welcome to the Building')
                break;
        }
    </script>
</head>

<body>

</body>

</html>
