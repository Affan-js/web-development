<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control_statement</title>
    <script>

        /////////////////////////////////////
        ///////////IF STATEMENT//////////////
        /////////////////////////////////////
        var age = prompt("Enter Your Age: ");
        if (age > 16 && age < 20) {

            document.writeln("Your Eligible");
        }

        /////////////////////////////////////
        ///////////IF ELSE STATEMENT/////////
        /////////////////////////////////////

        var age = prompt("Enter Your Age: ");
        if (age > 16 && age < 20) {

            document.writeln("Your Eligible");
        } else {
            Document.writeln("Your not Eligible");
        }



    </script>
</head>

</body>

</html>
