<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Assignment Operators</title>
    <script>

        var x = 10;
        x = x + 10;
        // the statement can be even shoter 

        x = x + 10;
        document.write('<br/> x + 10: ' + x);
        x += 10; // x = x + 10
        document.write('<br/> x += 10: ' + x);
        x *= 10; // x = x * 10;
        document.write('<br/> x * 10: ' + x);
        x -= 10; //x = x - 10;
        document.write('<br/> x -= 10: ' + x);
    </script>
</head>

<body>

</body>

</html>
